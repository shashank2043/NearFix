server:
  port: 8888

spring:
  cloud:
    config:
      server:
        native:
          search-locations: file:/app/config-repo/

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

management:
  health:
    eureka:
      enabled: false
