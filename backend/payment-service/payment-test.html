<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NearFix - Razorpay Payment Test Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Razorpay Checkout Script -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --accent-glow: 0 0 20px rgba(99, 102, 241, 0.4);
            --border-glow: 1px solid rgba(99, 102, 241, 0.2);
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 580px;
            perspective: 1000px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            padding: 40px;
            position: relative;
            overflow: hidden;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .card-content {
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-control {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: var(--accent-glow);
            background: rgba(15, 23, 42, 0.8);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .row .form-group {
            flex: 1;
        }

        .btn {
            display: block;
            width: 100%;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin-top: 30px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--accent-glow), 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .alert {
            display: none;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
            animation: fadeIn 0.4s ease forwards;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-content">
                <header>
                    <div class="logo">NearFix Pay</div>
                    <div class="subtitle">Secure HTML Portal for Razorpay Payments</div>
                </header>

                <!-- Alert Message -->
                <div id="alertBox" class="alert"></div>

                <form id="paymentForm">
                    <div class="form-group">
                        <label for="gatewayUrl">API Gateway / Payment Service URL</label>
                        <input
                            type="url"
                            id="gatewayUrl"
                            class="form-control"
                            value="http://localhost:8080"
                            required
                            placeholder="http://localhost:8080"
                        />
                    </div>

                    <div class="form-group">
                        <label for="jwtToken">JWT Token (Bearer)</label>
                        <textarea
                            id="jwtToken"
                            class="form-control"
                            required
                            placeholder="Paste your JWT Bearer token here..."
                        ></textarea>
                    </div>

                    <div class="row">
                        <div class="form-group">
                            <label for="bookingId">Booking ID</label>
                            <input
                                type="number"
                                id="bookingId"
                                class="form-control"
                                required
                                placeholder="101"
                            />
                        </div>

                        <div class="form-group">
                            <label for="amount">Amount (INR)</label>
                            <input
                                type="number"
                                id="amount"
                                step="0.01"
                                class="form-control"
                                required
                                placeholder="500.00"
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="razorpayKey">Razorpay Key ID</label>
                        <input
                            type="text"
                            id="razorpayKey"
                            class="form-control"
                            value="rzp_test_5g6h7i8j9k0l1m"
                            required
                            placeholder="rzp_test_..."
                        />
                    </div>

                    <button type="submit" id="submitBtn" class="btn">
                        <span id="btnLoader" class="loader"></span>
                        <span id="btnText">Initiate Razorpay Checkout</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Vanilla Javascript Logic -->
    <script>
        const paymentForm = document.getElementById("paymentForm");
        const alertBox = document.getElementById("alertBox");
        const submitBtn = document.getElementById("submitBtn");
        const btnLoader = document.getElementById("btnLoader");
        const btnText = document.getElementById("btnText");

        function showAlert(type, message) {
            alertBox.className = `alert alert-${type}`;
            alertBox.innerText = message;
            alertBox.style.display = "block";
        }

        function hideAlert() {
            alertBox.style.display = "none";
        }

        paymentForm.addEventListener("submit", async function (e) {
            e.preventDefault();
            hideAlert();

            // Set loading state
            submitBtn.disabled = true;
            btnLoader.style.display = "inline-block";
            btnText.innerText = "Processing Transaction...";

            const gatewayUrl = document.getElementById("gatewayUrl").value.trim();
            const jwtToken = document.getElementById("jwtToken").value.trim();
            const bookingId = document.getElementById("bookingId").value;
            const amount = document.getElementById("amount").value;
            const razorpayKey = document.getElementById("razorpayKey").value.trim();

            if (!jwtToken) {
                showAlert("error", "JWT Token is required to authorize the request.");
                resetButton();
                return;
            }

            try {
                // Step 1: Initiate Payment Order with Backend API
                const response = await fetch(`${gatewayUrl}/api/payments`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${jwtToken}`
                    },
                    body: JSON.stringify({
                        bookingId: parseInt(bookingId),
                        amount: parseFloat(amount)
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || `API Error: ${response.status}`);
                }

                showAlert("success", `Backend order created successfully! Order ID: ${data.transactionId}. Directing to Razorpay payment UI...`);

                // Step 2: Configure and trigger Razorpay Checkout
                const options = {
                    key: razorpayKey,
                    amount: Math.round(parseFloat(amount) * 100), // amount in paise
                    currency: "INR",
                    name: "NearFix Portal",
                    description: `Emergency Service Booking #${bookingId}`,
                    order_id: data.transactionId,
                    handler: function (razorpayResponse) {
                        showAlert("success", `🎉 Payment completed successfully! Razorpay Payment ID: ${razorpayResponse.razorpay_payment_id}`);
                    },
                    prefill: {
                        name: "NearFix Customer",
                        email: "customer@nearfix.com",
                        contact: "9999999999"
                    },
                    theme: {
                        color: "#6366f1"
                    },
                    modal: {
                        ondismiss: function () {
                            showAlert("error", "Razorpay Checkout dismissed by user.");
                        }
                    }
                };

                const rzp = new Razorpay(options);
                rzp.open();

            } catch (error) {
                console.error("Payment initiation failed", error);
                showAlert("error", `Payment initiation failed: ${error.message}`);
            } finally {
                resetButton();
            }
        });

        function resetButton() {
            submitBtn.disabled = false;
            btnLoader.style.display = "none";
            btnText.innerText = "Initiate Razorpay Checkout";
        }
    </script>
</body>
</html>
